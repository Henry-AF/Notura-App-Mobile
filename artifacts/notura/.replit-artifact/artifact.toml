kind = "mobile"
previewPath = "/"
title = "Notura — AI Meeting Assistant"
version = "1.0.0"
id = "artifacts/notura"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21377

[services.development]
run = "pnpm --filter @workspace/notura run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/notura", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/notura", "run", "serve" ]

[services.env]
PORT = "21377"
BASE_PATH = "/"
